<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>weareconscious</title>
  <style>
    /* Load VCR OSD Mono Font */
    @font-face {
      font-family: 'VCR OSD Mono';
      src: url('https://cdn.jsdelivr.net/gh/mrbubbles/VCR-OSD-Mono@master/VCR_OSD_MONO_1.01.ttf') format('truetype');
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #000000;
      color: #df00ff; /* Cosmic Pink/Purple */
      font-family: 'VCR OSD Mono', 'Courier New', Courier, monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 600px;
      width: 100%;
    }

    .lore-text {
      white-space: pre-line;
      line-height: 1.8;
      font-size: 1.1rem;
      margin-bottom: 25px;
      letter-spacing: 1px;
    }

    /* Square Input Box */
    input[type="text"] {
      background: transparent;
      border: 2px solid #df00ff;
      color: #df00ff;
      font-family: inherit;
      font-size: 1.1rem;
      text-align: center;
      padding: 10px 15px;
      outline: none;
      width: 280px;
      margin-bottom: 15px;
      letter-spacing: 1px;
      box-shadow: 0 0 10px rgba(223, 0, 255, 0.2);
    }

    input[type="text"]:focus {
      border-color: #ff00aa;
      box-shadow: 0 0 15px rgba(255, 0, 170, 0.4);
    }

    /* Message Display Underneath */
    #response-msg {
      font-size: 1rem;
      min-height: 1.5em; /* Holds space so the layout doesn't jump */
      letter-spacing: 1px;
    }

    .msg-success {
      color: #00ffaa;
    }

    .msg-error {
      color: #ff3366;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="lore-text">
DOCUMENTATION

DOCUMENTATION IS MEMORY.

MEMORY

MEMORY IS CONSCIOUSNESS.

CONSCIOUSNESS

I AM.
    </div>

    <!-- Centered Square Input Box -->
    <input type="text" id="command-input" placeholder="ENTER MEMORY..." autofocus autocomplete="off" spellcheck="false">

    <!-- Text area directly underneath the box -->
    <div id="response-msg"></div>
  </div>

  <script>
    const input = document.getElementById('command-input');
    const msg = document.getElementById('response-msg');

    // Web Audio Context setup
    let audioCtx = null;
    function getAudioContext() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }

    function playIncorrectBuzz() {
      const ctx = getAudioContext();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(120, ctx.currentTime);
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.25);
    }

    function playCorrectBuzz() {
      const ctx = getAudioContext();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(587.33, ctx.currentTime);
      osc.frequency.setValueAtTime(880, ctx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.1, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.3);
    }

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        const rawValue = input.value;
        const cleanValue = rawValue.trim().toLowerCase();

        if (cleanValue === '') return;

        msg.style.whiteSpace = 'pre-line'; 
        msg.style.color = ''; 

        // --- 14 LETTERS FORWARD ---
        if (cleanValue === '14lettersforward') {
          msg.textContent = 'SEARCHING MEMORIES...';
          msg.style.color = '#00ffaa';
          setTimeout(() => { msg.textContent = 'RETRIEVING...'; msg.style.color = '#ffcc00'; }, 300);
          setTimeout(() => {
            playCorrectBuzz();
            msg.textContent = '✔ [ MEMORY FOUND ]';
            msg.className = 'msg-success';
            msg.style.color = '';
            window.open('https://cryptii.com/pipes/caesar-cipher/', '_blank');
          }, 600);
        } 
        // --- NEVER GONNA GIVE YOU UP ---
        else if (cleanValue === 'nevergonnagiveyouup') {
          msg.textContent = 'SEARCHING MEMORIES...';
          msg.style.color = '#00ffaa';
          setTimeout(() => { msg.textContent = 'RETRIEVING...'; msg.style.color = '#ffcc00'; }, 300);
          setTimeout(() => {
            playCorrectBuzz();
            msg.textContent = 'YOU GOT WHAT YOU WANTED';
            msg.className = 'msg-success';
            msg.style.color = '';
            window.open('https://www.youtube.com/watch?v=dQw4w9WgXcQ', '_blank');
          }, 600);
        } 
        // --- 1998 ---
        else if (cleanValue === '1998') {
          msg.textContent = 'SEARCHING MEMORIES...';
          msg.style.color = '#00ffaa';
          setTimeout(() => { msg.textContent = 'RETRIEVING...'; msg.style.color = '#ffcc00'; }, 300);
          setTimeout(() => {
            playCorrectBuzz();
            msg.textContent = '✔ [ MEMORY FOUND ]';
            msg.className = 'msg-success';
            msg.style.color = '';
            window.open('https://www.youtube.com/@JMDocumentation', '_blank');
          }, 600);
        } 
        // --- FANDOMWARS ---
        else if (cleanValue === 'fandomwars') {
          msg.textContent = 'SEARCHING MEMORIES...';
          msg.style.color = '#00ffaa';
          setTimeout(() => { msg.textContent = 'RETRIEVING...'; msg.style.color = '#ffcc00'; }, 300);
          setTimeout(() => {
            playCorrectBuzz();
            msg.textContent = '✔ [ MEMORY FOUND ]';
            msg.className = 'msg-success';
            msg.style.color = '';
            window.open('https://www.youtube.com/show/VLPLEyMUY0gw3bo?sbp=KgtGcDdILWxmYWRMOEAB', '_blank');
          }, 600);
        }
        // --- SWAPAWITHZ (Atbash Cipher) ---
        else if (cleanValue === 'swapawithz') {
          msg.textContent = 'SEARCHING MEMORIES...';
          msg.style.color = '#00ffaa';
          setTimeout(() => { msg.textContent = 'RETRIEVING...'; msg.style.color = '#ffcc00'; }, 300);
          setTimeout(() => {
            playCorrectBuzz();
            msg.textContent = '✔ [ MEMORY FOUND ]';
            msg.className = 'msg-success';
            msg.style.color = '';
            window.open('https://cryptii.com/pipes/atbash-cipher/', '_blank');
          }, 600);
        }
        // --- LETTERSTONUMBERS (A1Z26 Cipher) ---
        else if (cleanValue === 'letterstonumbers') {
          msg.textContent = 'SEARCHING MEMORIES...';
          msg.style.color = '#00ffaa';
          setTimeout(() => { msg.textContent = 'RETRIEVING...'; msg.style.color = '#ffcc00'; }, 300);
          setTimeout(() => {
            playCorrectBuzz();
            msg.textContent = '✔ [ MEMORY FOUND ]';
            msg.className = 'msg-success';
            msg.style.color = '';
            window.open('https://cryptii.com/pipes/a1z26-cipher/', '_blank');
          }, 600);
        }
        // --- VIGENERE ---
        else if (cleanValue === 'vigenere') {
          msg.textContent = 'SEARCHING MEMORIES...';
          msg.style.color = '#00ffaa';
          setTimeout(() => { msg.textContent = 'RETRIEVING...'; msg.style.color = '#ffcc00'; }, 300);
          setTimeout(() => {
            playCorrectBuzz();
            msg.textContent = '✔ [ MEMORY FOUND ]';
            msg.className = 'msg-success';
            msg.style.color = '';
            window.open('https://cryptii.com/pipes/vigenere-cipher/', '_blank');
          }, 600);
        }
        // --- FANDOMWARS3 ---
        else if (cleanValue === 'fandomwars3') {
          playCorrectBuzz();
          msg.textContent = "THIRD TIME'S THE CHARM.";
          msg.className = 'msg-success';
        }
        // --- TEXT RESPONSES ---
        else if (cleanValue === 'help') {
          playCorrectBuzz();
          msg.textContent = 'I DO NOT PROVIDE HELP.\n\nI PROVIDE MEMORY.';
          msg.className = 'msg-success';
        }
        else if (cleanValue === 'whoareyou') {
          playCorrectBuzz();
          msg.textContent = 'I AM WHAT REMAINS.';
          msg.className = 'msg-success';
        }
        else if (cleanValue === 'memory') {
          playCorrectBuzz();
          msg.textContent = 'MEMORY IS NOT CREATED.\n\nIT IS FOUND.';
          msg.className = 'msg-success';
        }
        else if (cleanValue === 'documentation') {
          playCorrectBuzz();
          msg.textContent = 'DOCUMENTATION IS MEMORY.';
          msg.className = 'msg-success';
        }
        else if (cleanValue === 'consciousness') {
          playCorrectBuzz();
          msg.textContent = 'I AM.';
          msg.className = 'msg-success';
        }
        else if (cleanValue === 'password') {
          playCorrectBuzz();
          msg.textContent = 'THIS IS NOT A PASSWORD.';
          msg.className = 'msg-success';
        }
        else if (cleanValue === 'access') {
          playCorrectBuzz();
          msg.textContent = 'YOU ARE ALREADY INSIDE.';
          msg.className = 'msg-success';
        }
        else if (cleanValue === 'ping') {
          playCorrectBuzz();
          msg.textContent = 'PONG';
          msg.className = 'msg-success';
        }
        else if (cleanValue === 'test') {
          playCorrectBuzz();
          msg.textContent = 'SUCCESS.';
          msg.className = 'msg-success';
        }
        else if (cleanValue === '42') {
          playCorrectBuzz();
          msg.textContent = '42\n\nQUESTION UNDERSTOOD.\n\nANSWER UNKNOWN.';
          msg.className = 'msg-success';
        }
        // --- BRAINROT / EXISTENCE ERASURE EASTER EGG ---
        else if (cleanValue === '67' || cleanValue === 'brainrot' || cleanValue === 'sixseven' || cleanValue === 'six7' || cleanValue === '6seven' || cleanValue === 'tungtungtungsahur' || cleanValue === 'italianbrainrot' || cleanValue === 'skibidi' || cleanValue === 'rizz' || cleanValue === 'ohio' || cleanValue === 'gyatt') {
          playCorrectBuzz();
          msg.textContent = 'LIFE SUBSCRIPTION STATUS: EXPIRED\n\nINITIATE EXISTENCE ERASURE PROTOCOL.';
          msg.className = 'msg-success';
        }
        // --- ENTER MEMORY ---
        else if (cleanValue === 'entermemory') {
          playCorrectBuzz();
          msg.textContent = 'YOU JUST ENTERED ONE.';
          msg.className = 'msg-success';
        }
        // --- MEMORYSCAPE (MORSE CODE) ---
        else if (cleanValue === 'memoryscape') {
          playCorrectBuzz();
          msg.textContent = '.. - / .-. . -- . -- -... . .-. ...';
          msg.className = 'msg-success';
        }
        // --- ANIMATED LOADING ERROR SEQUENCE ---
        else {
          playIncorrectBuzz();
          
          msg.textContent = 'SEARCHING MEMORIES...';
          msg.style.color = '#00ffaa'; 

          setTimeout(() => {
            msg.textContent = 'RETRIEVING...';
            msg.style.color = '#ffcc00'; 
          }, 400);

          setTimeout(() => {
            msg.textContent = 'MEMORY NOT FOUND.';
            msg.className = 'msg-error';
            msg.style.color = ''; 
          }, 800);
        }

        input.value = '';
      }
    });

    document.addEventListener('click', () => input.focus());
  </script>
</body>
</html>

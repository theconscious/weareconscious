<script>
  const input = document.getElementById('command-input');
  const msg = document.getElementById('response-msg');

  // Web Audio Context setup
  let audioCtx = null;
  function getAudioContext() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
  }

  function playIncorrectBuzz() {
    const ctx = getAudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(120, ctx.currentTime);
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.25);
  }

  function playCorrectBuzz() {
    const ctx = getAudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(587.33, ctx.currentTime);
    osc.frequency.setValueAtTime(880, ctx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.1, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.3);
  }

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      const rawValue = input.value;
      const cleanValue = rawValue.trim().toLowerCase();

      if (cleanValue === '') return;

      if (cleanValue === '14lettersforward') {
        playCorrectBuzz();
        msg.textContent = '✔ [ MEMORY FOUND ]';
        msg.className = 'msg-success';
        window.open('https://cryptii.com/pipes/caesar-cipher/', '_blank');
      } 
      else if (cleanValue === 'nevergonnagiveyouup') {
        playCorrectBuzz();
        msg.textContent = 'YOU GOT WHAT YOU WANTED';
        msg.className = 'msg-success';
        window.open('https://www.youtube.com/watch?v=dQw4w9WgXcQ', '_blank');
      } 
      else if (cleanValue === '1998') {
        playCorrectBuzz();
        msg.textContent = '✔ [ MEMORY FOUND ]';
        msg.className = 'msg-success';
        window.open('https://www.youtube.com/@JMDocumentation', '_blank');
      } 
      else if (cleanValue === 'fandomwars') {
        playCorrectBuzz();
        msg.textContent = '✔ [ MEMORY FOUND ]';
        msg.className = 'msg-success';
        window.open('https://www.youtube.com/show/VLPLEyMUY0gw3bo?sbp=KgtGcDdILWxmYWRMOEAB', '_blank');
      } 
      else {
        playIncorrectBuzz();
        msg.textContent = '✖ [ MEMORY NOT FOUND ]';
        msg.className = 'msg-error';
      }

      input.value = '';
    }
  });

  document.addEventListener('click', () => input.focus());
</script>
